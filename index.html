<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dice Baseball</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css">
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
  <div id="app">
    <!-- Sprite Animation Scene (top 30%) -->
    <div id="sprite-scene"></div>

    <!-- Game Board (middle ~50%) -->
    <div id="game-board">
      <!-- Player Names Row -->
      <div id="player-row">
        <div class="player-label pitcher-label">Pitcher</div>
        <div class="player-label batter-label" id="batter-name">Batter</div>
      </div>

      <!-- Count Health Bars (start full, drain on strikes/balls) -->
      <div id="count-bars">
        <div id="strike-bar" class="health-bar">
          <span class="health-label">K</span>
          <div class="health-pips">
            <div class="pip pip-strike filled" id="strike-0"></div>
            <div class="pip pip-strike filled" id="strike-1"></div>
            <div class="pip pip-strike filled" id="strike-2"></div>
          </div>
        </div>
        <div id="ball-bar" class="health-bar">
          <div class="health-pips">
            <div class="pip pip-ball filled" id="ball-0"></div>
            <div class="pip pip-ball filled" id="ball-1"></div>
            <div class="pip pip-ball filled" id="ball-2"></div>
          </div>
          <span class="health-label">BB</span>
        </div>
      </div>

      <!-- Outcome Bar (full width, below names) -->
      <div id="outcome-bar">
        <div id="pitch-result-label"></div>
        <div id="ob-track">
          <div id="ob-indicator"><span id="ob-value">0</span></div>
          <div id="ob-zero-mark"></div>
        </div>
        <div id="ob-labels">
          <span class="ob-label ob-label-strike">Strike</span>
          <span class="ob-label ob-label-ball">Ball</span>
          <span class="ob-label ob-label-hit">Contact!</span>
        </div>
      </div>

      <!-- Power Bar (hidden, replaces outcome bar on contact) -->
      <div id="power-bar" class="hidden">
        <div id="power-label">POWER</div>
        <div id="power-track">
          <div id="power-fill"></div>
          <div id="power-value">0</div>
        </div>
        <div id="power-labels">
          <span>0</span>
          <span>1</span>
          <span>3</span>
        </div>
      </div>

      <!-- Battlefield -->
      <div id="battlefield">
        <div id="pitcher-side">
          <div id="pitcher-dice" class="dice-col"></div>
        </div>

        <div id="center-col">
          <div id="battle-zone">
            <div class="battle-lane" id="lane-0"></div>
            <div class="battle-lane" id="lane-1"></div>
          </div>
        </div>

        <div id="batter-side">
          <div id="batter-dice" class="dice-col">
            <div id="tap-prompt" class="roll-placeholder hidden">Tap to Swing</div>
          </div>
        </div>
      </div>

      <!-- Power Roll Area (hidden, replaces battlefield on contact) -->
      <div id="power-roll-area" class="hidden">
        <div id="power-dice-row">
          <div id="power-tap-prompt" class="roll-placeholder">Tap to Roll</div>
        </div>
      </div>

      <!-- Result Overlay -->
      <div id="result-overlay" class="hidden">
        <span id="result-overlay-text"></span>
      </div>
    </div>

    <!-- TV-Style Status Bar (bottom ~20%) -->
    <div id="tv-bar">
      <div id="tv-outs">0 Outs</div>
      <div class="tv-sep">|</div>
      <div id="tv-inning">Top 1</div>
      <div class="tv-sep">|</div>
      <div id="tv-score">0</div>
    </div>
  </div>

  <!-- Pitch Clock Overlay -->
  <div id="pitch-clock-overlay">
    <div id="pitch-clock-display">
      <span id="pitch-clock-ghost">88</span>
      <span id="pitch-clock-time">15</span>
    </div>
  </div>

  <!-- Debug FAB -->
  <button id="debug-fab">?</button>
  <div id="debug-panel" class="hidden">
    <button id="debug-close">&times;</button>
    <button id="test-hit-btn">Test Contact</button>
    <div class="slider-group">
      <label>Pitcher Dice: <span id="pitcher-dice-count">2</span></label>
      <input type="range" id="pitcher-dice-slider" min="1" max="4" value="2">
    </div>
    <div class="slider-group">
      <label>Batter Dice: <span id="batter-dice-count">2</span></label>
      <input type="range" id="batter-dice-slider" min="1" max="4" value="2">
    </div>
    <div class="slider-group">
      <label>Ball threshold: <span id="ball-thresh-val">0</span></label>
      <input type="range" id="ball-thresh" min="-4" max="8" value="0">
    </div>
    <div class="slider-group">
      <label>Hit threshold: <span id="hit-thresh-val">7</span></label>
      <input type="range" id="hit-thresh" min="3" max="12" value="7">
    </div>
  </div>

    <!-- Inning Summary -->
    <div id="inning-summary" class="hidden">
      <div id="summary-content">
        <h2>Inning Over</h2>
        <div id="final-score"></div>
        <div id="summary-log"></div>
        <button id="replay-btn">Play Again</button>
      </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="config.js?v=11" defer></script>
  <script src="dice.js?v=11" defer></script>
  <script src="sprites.js?v=11" defer></script>
  <script src="animations.js?v=11" defer></script>
  <script src="ui.js?v=11" defer></script>
  <script src="game.js?v=11" defer></script>
</body>
</html>
