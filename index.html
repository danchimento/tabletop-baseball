<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dice Baseball</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <div id="top-bar">
      <div id="scoreboard">
        <span id="score-display">Score: 0</span>
        <span id="inning-display">Top 1st</span>
        <span id="outs-display">Outs: <span class="out-dots"></span></span>
      </div>
      <div id="status-row">
        <svg id="mini-diamond" viewBox="0 0 50 50" width="36" height="36">
          <polygon points="25,5 45,25 25,45 5,25" fill="none" stroke="#8B6914" stroke-width="1.5"/>
          <circle id="base-1" cx="45" cy="25" r="4" fill="#2a2a2a" stroke="#8B6914" stroke-width="1.5"/>
          <circle id="base-2" cx="25" cy="5" r="4" fill="#2a2a2a" stroke="#8B6914" stroke-width="1.5"/>
          <circle id="base-3" cx="5" cy="25" r="4" fill="#2a2a2a" stroke="#8B6914" stroke-width="1.5"/>
        </svg>
        <div id="count">
          <div class="count-row"><span class="count-label">B</span><span id="balls-dots" class="count-dots"></span></div>
          <div class="count-row"><span class="count-label">S</span><span id="strikes-dots" class="count-dots"></span></div>
        </div>
      </div>
    </div>

    <!-- Player Names Row -->
    <div id="player-row">
      <div class="player-label pitcher-label">Pitcher</div>
      <div class="player-label batter-label" id="batter-name">Batter</div>
    </div>

    <!-- Outcome Bar (full width, below names) -->
    <div id="outcome-bar">
      <div id="ob-track">
        <div id="ob-indicator"></div>
        <div id="ob-zero-mark"></div>
      </div>
      <div id="ob-labels">
        <span class="ob-label ob-label-strike">K</span>
        <span class="ob-label ob-label-foul">Foul</span>
        <span class="ob-label ob-label-ball">Ball</span>
        <span class="ob-label ob-label-hit">Hit!</span>
      </div>
    </div>

    <!-- Battlefield -->
    <div id="battlefield">
      <div id="pitcher-side">
        <div id="pitcher-dice" class="dice-col"></div>
      </div>

      <div id="center-col">
        <div id="battle-zone">
          <div class="battle-lane" id="lane-0"></div>
          <div class="battle-lane" id="lane-1"></div>
        </div>
      </div>

      <div id="batter-side">
        <div id="batter-dice" class="dice-col"></div>
      </div>
    </div>

    <!-- Action Button -->
    <div id="action-area">
      <button id="action-btn" disabled>Loading...</button>
    </div>

    <!-- Debug Controls -->
    <div id="debug-controls" class="collapsed">
      <button id="debug-toggle">Debug ▸</button>
      <button id="test-hit-btn">Test Hit</button>
      <div class="slider-group">
        <label>Pitcher Dice: <span id="pitcher-dice-count">2</span></label>
        <input type="range" id="pitcher-dice-slider" min="1" max="4" value="2">
      </div>
      <div class="slider-group">
        <label>Batter Dice: <span id="batter-dice-count">2</span></label>
        <input type="range" id="batter-dice-slider" min="1" max="4" value="2">
      </div>
      <div class="slider-group">
        <label>Ball threshold: <span id="ball-thresh-val">5</span></label>
        <input type="range" id="ball-thresh" min="2" max="8" value="5">
      </div>
      <div class="slider-group">
        <label>Hit threshold: <span id="hit-thresh-val">7</span></label>
        <input type="range" id="hit-thresh" min="3" max="12" value="7">
      </div>
      <div class="slider-group">
        <label>Foul min: <span id="foul-min-val">-2</span></label>
        <input type="range" id="foul-min" min="-6" max="0" value="-2">
      </div>
      <div class="slider-group">
        <label>Strike threshold: <span id="strike-thresh-val">-3</span></label>
        <input type="range" id="strike-thresh" min="-8" max="-1" value="-3">
      </div>
    </div>

    <!-- Pitch Clock Overlay -->
    <div id="pitch-clock-overlay">
      <div id="pitch-clock-display">
        <span id="pitch-clock-time">15</span>
      </div>
    </div>

    <!-- Contact Modal -->
    <div id="contact-modal" class="hidden">
      <div id="contact-wrapper">
        <div id="field-view">
          <svg id="baseball-field" viewBox="0 0 300 280">
            <!-- Background -->
            <rect width="300" height="280" fill="#1a3a1a"/>
            <!-- Outfield grass -->
            <path d="M 150 260 L 8.6 118.6 A 200 200 0 0 1 291.4 118.6 Z" fill="#2d5a1e"/>
            <!-- Infield dirt -->
            <path d="M 150 260 L 107.6 217.6 A 60 60 0 0 1 192.4 217.6 Z" fill="#8B6914" opacity="0.5"/>

            <!-- Fence -->
            <path d="M 33.3 143.3 A 165 165 0 0 1 266.7 143.3" fill="none" stroke="#654" stroke-width="3"/>
            <!-- Foul lines -->
            <line x1="150" y1="260" x2="8.6" y2="118.6" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
            <line x1="150" y1="260" x2="291.4" y2="118.6" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
            <!-- Base diamond -->
            <polygon points="150,260 180,230 150,200 120,230" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
            <rect x="147" y="257" width="6" height="6" fill="#fff" transform="rotate(45,150,260)"/>
            <rect x="177" y="227" width="6" height="6" fill="#fff" transform="rotate(45,180,230)"/>
            <rect x="147" y="197" width="6" height="6" fill="#fff" transform="rotate(45,150,200)"/>
            <rect x="117" y="227" width="6" height="6" fill="#fff" transform="rotate(45,120,230)"/>

            <!-- Number markers: red=out, green=hit, gold=HR -->
            <g font-size="11" font-weight="700" text-anchor="middle" fill="#fff">
              <circle cx="130" cy="230" r="12" fill="rgba(233,69,96,0.7)" stroke="rgba(233,69,96,0.9)" stroke-width="1.5"/><text x="130" y="234">2</text>
              <circle cx="150" cy="218" r="12" fill="rgba(233,69,96,0.7)" stroke="rgba(233,69,96,0.9)" stroke-width="1.5"/><text x="150" y="222">3</text>
              <circle cx="170" cy="230" r="12" fill="rgba(233,69,96,0.7)" stroke="rgba(233,69,96,0.9)" stroke-width="1.5"/><text x="170" y="234">4</text>
              <circle cx="85" cy="178" r="12" fill="rgba(233,69,96,0.7)" stroke="rgba(233,69,96,0.9)" stroke-width="1.5"/><text x="85" y="182">5</text>
              <circle cx="150" cy="158" r="12" fill="rgba(233,69,96,0.7)" stroke="rgba(233,69,96,0.9)" stroke-width="1.5"/><text x="150" y="162">6</text>
              <circle cx="215" cy="178" r="12" fill="rgba(233,69,96,0.7)" stroke="rgba(233,69,96,0.9)" stroke-width="1.5"/><text x="215" y="182">7</text>
              <circle cx="110" cy="200" r="12" fill="rgba(76,175,80,0.7)" stroke="rgba(76,175,80,0.9)" stroke-width="1.5"/><text x="110" y="204">8</text>
              <circle cx="190" cy="200" r="12" fill="rgba(76,175,80,0.7)" stroke="rgba(76,175,80,0.9)" stroke-width="1.5"/><text x="190" y="204">9</text>
              <circle cx="58" cy="155" r="12" fill="rgba(76,175,80,0.7)" stroke="rgba(76,175,80,0.9)" stroke-width="1.5"/><text x="58" y="159">10</text>
              <circle cx="242" cy="155" r="12" fill="rgba(76,175,80,0.7)" stroke="rgba(76,175,80,0.9)" stroke-width="1.5"/><text x="242" y="159">11</text>
              <circle cx="150" cy="95" r="14" fill="rgba(240,192,64,0.85)" stroke="rgba(240,192,64,1)" stroke-width="2"/><text x="150" y="99" fill="#000">12</text>
            </g>
          </svg>
          <div id="field-overlay"></div>
          <div id="contact-outcome"></div>
        </div>
        <button id="contact-roll-btn" class="hidden">Roll!</button>
      </div>
    </div>

    <!-- Inning Summary -->
    <div id="inning-summary" class="hidden">
      <div id="summary-content">
        <h2>Inning Over</h2>
        <div id="final-score"></div>
        <div id="summary-log"></div>
        <button id="replay-btn">Play Again</button>
      </div>
    </div>
  </div>

  <script src="game.js?v=4" defer></script>
</body>
</html>
